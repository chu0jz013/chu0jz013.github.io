apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: hph
  name: portfolio-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: portfolio
  template:
    metadata:
      labels:
        app: portfolio
    spec:
      containers:
        - name: portfolio-container
          image: quachuoiscontainer/portfolio
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  namespace: hph
  name: portfolio-service
spec:
  selector:
    app: portfolio
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: LoadBalancer